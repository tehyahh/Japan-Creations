<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie & Series Hub - Red Edition</title>

<style>
:root {
    --cyber-red: #ff003c;
    --cyber-orange: #fcee0a;
    --dark-bg: #050505;
}

body {
    background-color: var(--dark-bg);
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    margin: 0;
}

/* HEADER */
.top-nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background-color: rgba(0, 0, 0, 0.9);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 30px;
    border-bottom: 2px solid var(--cyber-red);
}

.links-box {
    display: flex;
    gap: 25px;
}

.nav-item {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    transition: 0.2s;
}

.nav-item:hover {
    color: var(--cyber-red);
    transform: skew(-10deg);
}

/* SEARCH */
.search-bar {
    border: 2px solid var(--cyber-red);
    padding: 5px 12px;
    display: flex;
    align-items: center;
    background: rgba(255, 0, 60, 0.1);
}

.search-bar input {
    background: transparent;
    border: none;
    color: var(--cyber-orange);
    outline: none;
    margin-left: 8px;
}

/* GRID */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.anime-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
}

.chip-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: inherit;
}

.chip-outer {
    width: 200px;
    height: 250px;
    background: var(--cyber-red);
    display: flex;
    justify-content: center;
    align-items: center;
}

.chip-inner {
    width: 190px;
    height: 240px;
    overflow: hidden;
}

.chip-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.label-box {
    margin-top: 10px;
    color: var(--cyber-red);
}
</style>
</head>

<body>

<header class="top-nav">
    <div>🎬 SERIES HUB</div>

    <nav class="links-box">
        <a href="index.html" class="nav-item">HOME</a>
        <a href="movie/movie.html" class="nav-item">MOVIES</a>
        <a href="Series/seriess.html" class="nav-item">SERIES</a>
        <a href="authors/authors.html" class="nav-item">AUTHORS</a>
        <a href="about/about.html" class="nav-item">ABOUT</a>
    </nav>

    <div class="search-bar">
        ⚠ <input type="text" id="searchInput" placeholder="SEARCH">
    </div>
</header>

<div class="container">
    <main class="anime-grid" id="grid-container"></main>
</div>

<script>
const grid = document.getElementById('grid-container');
const searchInput = document.getElementById('searchInput');

const animeData = [
    { name: "JUJUTSU KAISEN", img: "JJK..jpg", url: "anime1.html" },
    { name: "DEMON SLAYER", img: "DS.jpg", url: "anime2.html" }
];

function renderAnime(data) {
    grid.innerHTML = "";

    data.forEach((anime) => {
        grid.innerHTML += `
            <a href="${anime.url}" class="chip-card">
                <div class="chip-outer">
                    <div class="chip-inner">
                        <img src="${anime.img}" class="chip-img">
                    </div>
                </div>
                <div class="label-box">${anime.name}</div>
            </a>
        `;
    });
}

searchInput.oninput = (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = animeData.filter(a =>
        a.name.toLowerCase().includes(term)
    );
    renderAnime(filtered);
};

renderAnime(animeData);
</script>

</body>
</html>
