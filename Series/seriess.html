<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie & Series Hub - Red Edition</title>

<style>
:root {
    --cyber-red: #ff003c;
    --cyber-orange: #fcee0a;
    --dark-bg: #050505;
}

body {
    background-color: var(--dark-bg);
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    margin: 0;
}

/* NAVBAR */
.top-nav {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: rgba(5, 5, 5, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid #ff003c;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 10px 30px;
}

/* LOGO */
.logo-box {
    display: flex;
    align-items: center;
    gap: 10px;
}

.logo-img {
    width: 40px;
    height: 40px;
    object-fit: cover;
}

.logo-text {
    font-size: 0.8rem;
    color: #fff;
}

/* NAV LINKS */
.links-box {
    display: flex;
    gap: 25px;
}

.nav-item {
    color: #fff;
    text-decoration: none;
    font-weight: bold;
    transition: 0.2s;
}

.nav-item:hover,
.nav-item.active {
    color: #ff003c;
    transform: skew(-10deg);
    text-shadow: 0 0 8px #ff003c;
}

/* SEARCH */
.search-bar {
    display: flex;
    align-items: center;
    border: 2px solid #ff003c;
    padding: 5px 10px;
    background: rgba(255, 0, 60, 0.1);
}

.search-bar input {
    background: transparent;
    border: none;
    color: #fcee0a;
    outline: none;
    margin-left: 8px;
    width: 120px;
}

/* GRID */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

.anime-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 40px;
}

.chip-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    color: inherit;
}

.chip-outer {
    width: 200px;
    height: 250px;
    background: var(--cyber-red);
    display: flex;
    justify-content: center;
    align-items: center;
}

.chip-inner {
    width: 190px;
    height: 240px;
    overflow: hidden;
}

.chip-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.label-box {
    margin-top: 10px;
    color: var(--cyber-red);
}
</style>
</head>

<body>

<header class="top-nav">

    <div class="logo-box">
        <img src="../logo.jpg" alt="Logo" class="logo-img">
        <span class="logo-text">JAPANESE CREATIONS</span>
    </div>

    <nav class="links-box">
        <a href="../index.html" class="nav-item">HOME</a>
        <a href="../movies/movie.html" class="nav-item">MOVIES</a>
        <a href="../Series/seriess.html" class="nav-item active">SERIES</a>
        <a href="../authors/authors.html" class="nav-item">AUTHORS</a>
        <a href="../about/about.html">ABOUT</a>
    </nav>

    <div class="search-bar">
        ⚠ <input type="text" id="searchInput" placeholder="SEARCH">
    </div>

</header>

    <div class="search-bar">
        ⚠ <input type="text" id="searchInput" placeholder="SEARCH">
    </div>
</header>

<div class="container">
    <main class="anime-grid" id="grid-container"></main>
</div>

  <script>
        const grid = document.getElementById('grid-container');
        const searchInput = document.getElementById('searchInput');

        const animeData = [
            { name: "JUJUTSU KAISEN", img: "JJK..jpg", url: "anime1.html" },
            { name: "DEMON SLAYER", img: "DS.jpg", url: "anime2.html" },
            { name: "CHAINSAWMAN", img: "CM.jpg", url: "anime3.html" },
            { name: "SAIKI K.", img: "SK.jpg", url: "anime4.html" },
            { name: "SPY X FAMILY", img: "SF.jpg", url: "anime5.html" },
            { name: "KAGUYA-SAMA", img: "LW.jpg", url: "anime6.html" },
            { name: "FRIEREN", img: "Frieren.jpg", url: "anime7.html" },
            { name: "HAIKYUU", img: "haikyu.jpg", url: "anime8.html" },
            { name: "SK8 THE INFINITY", img: "sk8.jpg", url: "anime9.html" }
        ];

        function renderAnime(data) {
            grid.innerHTML = "";
            if (data.length === 0) {
                grid.innerHTML = `<div class="empty-state">[DATABASE EMPTY: NO MATCHES]</div>`;
                return;
            }

            data.forEach((anime) => {
                grid.innerHTML += `
                    <a href="${anime.url}" class="chip-card">
                        <div class="chip-outer">
                            <div class="chip-inner"><img src="${anime.img}" alt="${anime.name}" class="chip-img"></div>
                        </div>
                        <div class="label-box">${anime.name}</div>
                    </a>
                `;
            });
        }

        function navigate(page, element) {
     
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
  
            element.classList.add('active');

            if(page === 'SERIES' || page === 'HOME') {
                renderAnime(animeData);
            } else {
                grid.innerHTML = `<div class="empty-state">[ACCESS DENIED: ${page} DATABASE OFFLINE]</div>`;
            }
        }


        searchInput.oninput = (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = animeData.filter(a => a.name.toLowerCase().includes(term));
            renderAnime(filtered);
        };


        renderAnime(animeData);
    </script>
</body>
</html>
